name: Auto-Sign & Deploy IPA

on:
  schedule:
    # Runs every 6 hours — adjust as needed
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no new cert/IPA'
        required: false
        default: 'false'
  repository_dispatch:
    types: [new-cert, new-ipa]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CERT_REPO: "NovaDev404/NovaCerts"
  IPA_REPO: "nyasami/ksign"
  APP_NAME: "KSign"
  BUNDLE_ID: "com.nyasami.ksign"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      should_build:      ${{ steps.check.outputs.should_build }}
      cert_folder:       ${{ steps.check.outputs.cert_folder }}
      cert_folders_json: ${{ steps.check.outputs.cert_folders_json }}
      ipa_url:           ${{ steps.check.outputs.ipa_url }}
      ipa_version:       ${{ steps.check.outputs.ipa_version }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Check for new cert & IPA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CERT_REPO_PAT: ${{ secrets.CERT_REPO_PAT }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: python scripts/check_updates.py

      - name: Sanitize cache key
        id: cache_key
        env:
          CERT_FOLDER: ${{ steps.check.outputs.cert_folder }}
          IPA_VERSION: ${{ steps.check.outputs.ipa_version }}
        run: |
          SAFE_KEY=$(echo "build-state-${CERT_FOLDER}-${IPA_VERSION}" \
            | tr -cs 'a-zA-Z0-9._-' '-' \
            | sed 's/-\+/-/g; s/^-//; s/-$//')
          echo "key=$SAFE_KEY" >> $GITHUB_OUTPUT

      - name: Cache state
        uses: actions/cache@v4
        with:
          path: .state
          key: ${{ steps.cache_key.outputs.key }}

  sign-and-deploy:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      # ── 1. Install zsign ─────────────────────────────────────────────────────
      - name: Install zsign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libssl-dev zlib1g-dev g++ \
            git openssl unzip curl jq

          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign/build/linux
          make -j$(nproc)
          sudo cp ../../bin/zsign /usr/local/bin/zsign
          zsign --version || echo "zsign installed"

      # ── 2. Fetch ALL cert bundles from NovaCerts repo ────────────────────────
      - name: Fetch all certificate bundles
        env:
          CERT_REPO_PAT:     ${{ secrets.CERT_REPO_PAT }}
          CERT_FOLDERS_JSON: ${{ needs.check-and-build.outputs.cert_folders_json }}
        run: python scripts/fetch_cert.py

      # ── 3. Fetch latest KSign IPA ─────────────────────────────────────────────
      - name: Fetch latest KSign IPA
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          IPA_URL:     ${{ needs.check-and-build.outputs.ipa_url }}
          IPA_VERSION: ${{ needs.check-and-build.outputs.ipa_version }}
        run: python scripts/fetch_ipa.py

      # ── 4. Bundle each cert into its own copy of the IPA ─────────────────────
      - name: Bundle certificates into IPAs
        run: python scripts/bundle_cert.py

      # ── 5. Sign every bundled IPA with zsign ──────────────────────────────────
      - name: Sign all IPAs
        run: python scripts/sign_ipas.py

      # ── 6. Generate manifest.plist(s) & index.html ───────────────────────────
      - name: Generate deployment assets
        env:
          IPA_VERSION:       ${{ needs.check-and-build.outputs.ipa_version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_assets.py

      # ── 7. Deploy to gh-pages ─────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          publish_branch: gh-pages
          force_orphan: false
          keep_files: false
          commit_message: |
            🚀 Auto-deploy: KSign ${{ needs.check-and-build.outputs.ipa_version }}

      # ── 8. Save build state ───────────────────────────────────────────────────
      - name: Save build state
        env:
          CERT_FOLDER: ${{ needs.check-and-build.outputs.cert_folder }}
          IPA_VERSION: ${{ needs.check-and-build.outputs.ipa_version }}
        run: |
          mkdir -p .state
          printf '%s' "$CERT_FOLDER" > .state/last_cert
          printf '%s' "$IPA_VERSION" > .state/last_ipa_version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/
          git diff --staged --quiet || git commit -m "chore: update build state [skip ci]"
          git push

      # ── 9. Summary ────────────────────────────────────────────────────────────
      - name: Summary
        env:
          IPA_VERSION:  ${{ needs.check-and-build.outputs.ipa_version }}
          CERT_FOLDER:  ${{ needs.check-and-build.outputs.cert_folder }}
          ALL_CERTS:    ${{ needs.check-and-build.outputs.cert_folders_json }}
          REPO_OWNER:   ${{ github.repository_owner }}
          REPO_NAME:    ${{ github.event.repository.name }}
        run: |
          {
            echo "## ✅ Build Complete"
            echo ""
            echo "- **IPA Version:** ${IPA_VERSION}"
            echo "- **Cert Folder (latest):** ${CERT_FOLDER}"
            echo "- **All Certs:** ${ALL_CERTS}"
            echo "- **OTA URL:** https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          } >> "$GITHUB_STEP_SUMMARY"
